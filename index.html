<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Personality Quiz</title>
    <link rel="icon" type="image/x-icon" href="/img/ideas.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7" crossorigin="anonymous">
    <link rel="stylesheet" href ="./css/style.css">
</head>
<body>
<div class="container mt-5">
    <h1 class="mb-4">Simple Personality Quiz</h1>

    <!-- Start quiz element (Duplicate this block for more questions) -->
    <div class="question-block mb-4 p-3 border rounded" data-question-id="1">
        <h5>1. What is your ideal weekend activity?</h5>
        <div class="answer-options d-grid gap-2">
            <button class="btn btn-outline-primary answer-btn" data-answer="A" data-points="3">Explore a new city</button>
            <button class="btn btn-outline-primary answer-btn" data-answer="B" data-points="4">Paint a picture</button>
            <button class="btn btn-outline-primary answer-btn" data-answer="C" data-points="1">Organize a party</button>
            <button class="btn btn-outline-primary answer-btn" data-answer="D" data-points="2">Read a complex book</button>
        </div>
    </div>
    <!-- End quiz element -->

    <!-- Question 2 -->
    <div class="question-block mb-4 p-3 border rounded" data-question-id="2">
        <h5>2. What is your go-to role in a group?</h5>
        <div class="answer-options d-grid gap-2">
            <button class="btn btn-outline-primary answer-btn" data-answer="A" data-points="3">The Trailblazer</button>
            <button class="btn btn-outline-primary answer-btn" data-answer="B" data-points="4">The Creative</button>
            <button class="btn btn-outline-primary answer-btn" data-answer="C" data-points="1">The Organizer</button>
            <button class="btn btn-outline-primary answer-btn" data-answer="D" data-points="2">The Strategist</button>
        </div>
    </div>

    <!-- Question 3 -->
    <div class="question-block mb-4 p-3 border rounded" data-question-id="3">
        <h5>3. Choose a, metaphorically, "new frontier":</h5>
        <div class="answer-options d-grid gap-2">
            <button class="btn btn-outline-primary answer-btn" data-answer="A" data-points="3">The Mountains</button>
            <button class="btn btn-outline-primary answer-btn" data-answer="B" data-points="4">The Canvas</button>
            <button class="btn btn-outline-primary answer-btn" data-answer="C" data-points="1">The Team</button>
            <button class="btn btn-outline-primary answer-btn" data-answer="D" data-points="2">The Concept</button>
        </div>
    </div>

    <!-- Question 4 -->
    <div class="question-block mb-4 p-3 border rounded" data-question-id="4">
        <h5>4. How do you solve problems?</h5>
        <div class="answer-options d-grid gap-2">
            <button class="btn btn-outline-primary answer-btn" data-answer="A" data-points="3">Take risks</button>
            <button class="btn btn-outline-primary answer-btn" data-answer="B" data-points="4">Find new perspectives</button>
            <button class="btn btn-outline-primary answer-btn" data-answer="C" data-points="1">Lead others</button>
            <button class="btn btn-outline-primary answer-btn" data-answer="D" data-points="2">Deep analysis</button>
        </div>
    </div>

    <button id="result-btn" class="btn btn-success btn-lg mt-3">Give Me the Results</button>

    <!-- Result Display -->
    <div id="result-container" class="mt-4 p-4 border rounded bg-light" style="display:none;">
        <h2 id="result-text"></h2>
    </div>
</div>

    <!-- Add more quiz elements here -->



    
    <!-- Output the result here -->
    <div class="container d-flex justify-content-center">
      <div id="result-container" class="card p-4 mb-4" style="width: 75%; display: none;">
        <h3>Your Result:</h3>
        <p id="result-text"></p>
      </div>
    </div>
    
    <!-- Connect to your script file here -->
     <script src = "./js/script.js"></script>
</body>
</html>
